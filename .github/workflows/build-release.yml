name: Build Installers

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame numpy
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install pyinstaller

      - name: Prepare client env defaults
        env:
          BUILD_API_KEY: ${{ secrets.NEUROGAME_API_KEY }}
          BUILD_TELEMETRY_URL: ${{ vars.NEUROGAME_TELEMETRY_URL }}
          BUILD_DEFAULT_TELEMETRY_URL: ${{ vars.NEUROGAME_DEFAULT_TELEMETRY_URL }}
        shell: python
        run: |
          import os
          from pathlib import Path

          telemetry_url = os.getenv("BUILD_TELEMETRY_URL", "").strip() or "http://45.159.211.104:8000/v1/events"
          default_telemetry_url = os.getenv("BUILD_DEFAULT_TELEMETRY_URL", "").strip() or telemetry_url
          api_key = os.getenv("BUILD_API_KEY", "").strip() or "change_me"
          backend_url = telemetry_url.replace("/v1/events", "").rstrip("/")

          payload = "\n".join(
              [
                  f"NEUROGAME_API_KEY={api_key}",
                  f"NEUROGAME_BACKEND_URL={backend_url}",
                  f"NEUROGAME_TELEMETRY_URL={telemetry_url}",
                  f"NEUROGAME_DEFAULT_TELEMETRY_URL={default_telemetry_url}",
              ]
          ) + "\n"
          Path(".env").write_text(payload, encoding="utf-8")

      - name: Build executable
        env:
          NEUROGAME_PYINSTALLER_MODE: onedir
        run: python packaging/build_desktop.py

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurogame-linux
          path: |
            dist/neurogame-*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Prepare client env defaults
        env:
          BUILD_API_KEY: ${{ secrets.NEUROGAME_API_KEY }}
          BUILD_TELEMETRY_URL: ${{ vars.NEUROGAME_TELEMETRY_URL }}
          BUILD_DEFAULT_TELEMETRY_URL: ${{ vars.NEUROGAME_DEFAULT_TELEMETRY_URL }}
        shell: python
        run: |
          import os
          from pathlib import Path

          telemetry_url = os.getenv("BUILD_TELEMETRY_URL", "").strip() or "http://45.159.211.104:8000/v1/events"
          default_telemetry_url = os.getenv("BUILD_DEFAULT_TELEMETRY_URL", "").strip() or telemetry_url
          api_key = os.getenv("BUILD_API_KEY", "").strip() or "change_me"
          backend_url = telemetry_url.replace("/v1/events", "").rstrip("/")

          payload = "\n".join(
              [
                  f"NEUROGAME_API_KEY={api_key}",
                  f"NEUROGAME_BACKEND_URL={backend_url}",
                  f"NEUROGAME_TELEMETRY_URL={telemetry_url}",
                  f"NEUROGAME_DEFAULT_TELEMETRY_URL={default_telemetry_url}",
              ]
          ) + "\n"
          Path(".env").write_text(payload, encoding="utf-8")

      - name: Build executable
        run: python packaging/build_desktop.py

      - name: Build DMG
        run: bash packaging/macos/make_dmg.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurogame-macos-${{ runner.arch }}
          path: |
            dist/NeuroGame.app
            dist/NeuroGame.dmg
            dist/neurogame-*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Prepare client env defaults
        env:
          BUILD_API_KEY: ${{ secrets.NEUROGAME_API_KEY }}
          BUILD_TELEMETRY_URL: ${{ vars.NEUROGAME_TELEMETRY_URL }}
          BUILD_DEFAULT_TELEMETRY_URL: ${{ vars.NEUROGAME_DEFAULT_TELEMETRY_URL }}
        shell: python
        run: |
          import os
          from pathlib import Path

          telemetry_url = os.getenv("BUILD_TELEMETRY_URL", "").strip() or "http://45.159.211.104:8000/v1/events"
          default_telemetry_url = os.getenv("BUILD_DEFAULT_TELEMETRY_URL", "").strip() or telemetry_url
          api_key = os.getenv("BUILD_API_KEY", "").strip() or "change_me"
          backend_url = telemetry_url.replace("/v1/events", "").rstrip("/")

          payload = "\n".join(
              [
                  f"NEUROGAME_API_KEY={api_key}",
                  f"NEUROGAME_BACKEND_URL={backend_url}",
                  f"NEUROGAME_TELEMETRY_URL={telemetry_url}",
                  f"NEUROGAME_DEFAULT_TELEMETRY_URL={default_telemetry_url}",
              ]
          ) + "\n"
          Path(".env").write_text(payload, encoding="utf-8")

      - name: Build executable
        env:
          NEUROGAME_PYINSTALLER_MODE: onedir
        run: python packaging/build_desktop.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\neurogame.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurogame-windows
          path: |
            dist/NeuroGameSetup.exe
            dist/neurogame-*.zip
